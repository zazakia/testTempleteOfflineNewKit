# ─── Root Netlify Configuration (Monorepo) ────────────────────
# Builds the apps/web package from the monorepo root.

[build]
  base = "."
  command = "pnpm install --frozen-lockfile && cd apps/web && npx vite build --outDir ../../dist"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "9"

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache strategy
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/workbox-*"
  [headers.values]
    Cache-Control = "no-cache"
