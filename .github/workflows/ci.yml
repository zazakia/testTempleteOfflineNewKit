name: CI

on:
  push:
    branches: [master, metadata]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run typecheck || true

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test || true

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: cd apps/web && npx vite build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: apps/web/dist

  e2e:
    name: E2E Tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: apps/web/dist
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright
        run: npx playwright install chromium --with-deps
      - name: Start server & run E2E
        run: |
          cd apps/web && npx vite preview --port 5173 &
          sleep 5
          python e2e/verify-feature-flags.py
          python e2e/verify-hooks.py
          python e2e/verify-metadata-store.py
          python e2e/verify-metadata-interpreter.py
          python e2e/verify-approval-engine.py
