name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm -r typecheck

      - name: Lint
        run: pnpm -r lint
        continue-on-error: true

      - name: Test
        run: pnpm -r test

      - name: Build
        run: pnpm build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Start API
        run: cd apps/api && npx tsx src/index.ts &
        env:
          PORT: 3001

      - name: Start Web
        run: cd apps/web && npx vite --port 5173 &
        
      - name: Wait for servers
        run: npx wait-on http://localhost:5173 http://localhost:3001
        
      - name: Run E2E tests
        run: npx playwright test
        continue-on-error: true
